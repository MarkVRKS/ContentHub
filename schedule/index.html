<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContentMafia • Оперативный Штаб</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Smoke Effect -->
    <div class="smoke-container">
        <div class="smoke smoke-1"></div>
        <div class="smoke smoke-2"></div>
        <div class="smoke smoke-3"></div>
    </div>

    <!-- Vignette -->
    <div class="vignette"></div>

    <!-- Film Grain -->
    <div class="film-grain"></div>

    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2.5"/>
                            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2.5"/>
                            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2.5"/>
                        </svg>
                    </div>
                    <div class="logo-text">
                        <span class="logo-title">CONTENTMAFIA</span>
                        <span class="logo-subtitle">Оперативный Штаб</span>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none">
                        <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
                        <line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="2"/>
                        <line x1="9" y1="9" x2="9" y2="22" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <span>Расписание</span>
                </a>
                <a href="#" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2"/>
                        <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <span>Семья</span>
                </a>
                <a href="#" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <span>Финансы</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="theme-selector">
                    <button class="theme-btn active" data-theme="dark" title="Классика">
                        <span>🎩</span>
                    </button>
                    <button class="theme-btn" data-theme="light" title="Дневная">
                        <span>☀️</span>
                    </button>
                    <button class="theme-btn" data-theme="neon" title="Неон">
                        <span>💎</span>
                    </button>
                </div>
                <div class="sidebar-quote">
                    "Семья превыше всего"
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <h1 class="page-title">График Операций</h1>
                    <p class="page-subtitle">Координация действий семьи</p>
                </div>
                <div class="header-right">
                    <div class="notification-badge" id="notification">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        <span class="badge-dot"></span>
                        <div class="notification-popup" id="notificationPopup">
                            <div class="notification-header">
                                <h3>Изменения в расписании</h3>
                                <button class="notification-close" id="notificationClose">×</button>
                            </div>
                            <div class="notification-list" id="notificationList">
                                <p class="notification-empty">Нет новых изменений</p>
                            </div>
                        </div>
                    </div>
                    <button class="btn-icon" id="editBtn">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="2"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                    <button class="btn-primary" id="saveBtn" style="display: none;">
                        <svg viewBox="0 0 24 24" fill="none">
                            <polyline points="20 6 9 17 4 12" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        Утвердить
                    </button>
                    <button class="btn-secondary" id="cancelBtn" style="display: none;">Отменить</button>
                </div>
            </header>

            <!-- Schedule Cards -->
            <div class="schedule-container" id="scheduleContainer"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
